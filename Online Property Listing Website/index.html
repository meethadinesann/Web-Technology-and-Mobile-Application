<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Listing Website</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Dream Homes</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Listings</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Find Your Perfect Property</h2>
    <p>Browse the best homes, apartments, and villas.</p>
  </section>

  <section class="property-section">
    <h2>Featured Properties</h2>

    <div class="property-container">

      <div class="property-card">
        <img src="https://via.placeholder.com/300" alt="Villa">
        <h3>Luxury Villa</h3>
        <p>📍 Chennai</p>
        <p class="price">₹ 1.2 Crore</p>
        <button>View Details</button>
      </div>

      <div class="property-card">
        <img src="https://via.placeholder.com/300" alt="Apartment">
        <h3>Modern Apartment</h3>
        <p>📍 Bangalore</p>
        <p class="price">₹ 75 Lakhs</p>
        <button>View Details</button>
      </div>

      <div class="property-card">
        <img src="https://via.placeholder.com/300" alt="Home">
        <h3>Family Home</h3>
        <p>📍 Coimbatore</p>
        <p class="price">₹ 60 Lakhs</p>
        <button>View Details</button>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 Dream Homes | All Rights Reserved</p>
  </footer>

</body>
</html>
